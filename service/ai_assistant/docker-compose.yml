services:
  # -----------------------------------------------------------------------
  # Redis 7 - 缓存服务
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai_assistant_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-521703}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-521703}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  redis_data:

networks:
  backend:
    driver: bridge  